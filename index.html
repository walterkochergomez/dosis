<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <img src="logo.svg" alt="Control de Dosis Logo" style="width: 72px; height: 72px; margin-bottom: 12px;">
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <title>Control de Dosis</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <header class="app-header">
      <div class="badge">Registro personal</div>
      <h1>Control de Dosis</h1>
      <p class="subtitle">Seguimiento de tu lápiz de medicamento</p>
    </header>
    <nav class="app-nav">
      <a href="index.html" class="nav-item active">💉 Dosis</a>
      <a href="peso.html" class="nav-item">⚖️ Peso</a>
    </nav>

    <div class="card display-card">
      <div class="card-header">
        <div class="icon icon-mint">💉</div>
        <h2>Remanente actual</h2>
      </div>
      <div class="card-body">
        <div class="remaining-block">
          <div class="remaining-value">
            <span id="remanente">4.00</span>
            <span class="unit">mg</span>
          </div>
        </div>

        <div class="pen-level-wrap">
          <div class="pen-level-label">
            <span>Nivel del lápiz</span>
            <span id="level-pct">100%</span>
          </div>
          <div class="pen-track">
            <div class="pen-fill" id="pen-fill" style="width: 100%"></div>
          </div>
          <div class="level-ticks">
            <span>0</span>
            <span id="tick-max">4.0 mg</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card input-card">
      <div class="card-header">
        <div class="icon icon-mint">＋</div>
        <h3>Registrar dosis</h3>
      </div>
      <div class="card-body">
        <div class="input-group">
          <input
            type="number"
            id="dosis-input"
            step="0.01"
            min="0"
            placeholder="0.25"
            autocomplete="off"
            inputmode="decimal"
          >
          <span class="unit-badge">mg</span>
        </div>
        
        <div id="clicks-display" class="clicks-info"></div>

        <button id="btn-aplicar" class="btn primary">
          <span>Aplicar dosis</span>
        </button>
        <p id="error-msg" class="error"></p>
      </div>
    </div>

    <div class="card history-card">
      <div class="card-header">
        <div class="icon icon-navy">📋</div>
        <h3>Historial de aplicaciones</h3>
      </div>
      <div class="card-body">
        <ul id="historial-lista">
          </ul>
      </div>
    </div>

    <div class="section-divider">Gestión del lápiz</div>

    <div class="card add-card">
      <div class="card-header">
        <div class="icon icon-amber">＋</div>
        <h3>Agregar nuevo lápiz</h3>
      </div>
      <div class="card-body">
        <div class="input-group">
          <label for="capacidad-input">Capacidad a sumar (mg)</label>
          <input
            type="number"
            id="capacidad-input"
            step="0.1"
            value="4.0"
            min="0.1"
            inputmode="decimal"
          >
        </div>
        <button id="btn-sumar-lapiz" class="btn secondary">
          <span>Sumar al remanente</span>
        </button>
      </div>
    </div>

    <div class="card danger-card">
      <div class="card-header">
        <div class="icon icon-danger">⚠</div>
        <h3>Opciones avanzadas</h3>
      </div>
      <div class="card-body">
        <button id="btn-borrar-todo" class="btn danger-extreme">
          <span>Borrar todos los datos</span>
        </button>
      </div>
    </div>

  </div><script src="script.js"></script>
</body>
</html>
